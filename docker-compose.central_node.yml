services:
  manticore:
    image: manticoresearch/manticore:latest
    restart: unless-stopped
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
      memlock:
        soft: -1
        hard: -1
    volumes:
      - manticore_data:/var/lib/manticore
      - ./manticore/manticore.conf:/etc/manticoresearch/manticore.conf
    healthcheck:
      test: ["CMD-SHELL", "curl localhost:9308"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "127.0.0.1:15672:15672"
    env_file:
      - .env.rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    ulimits:
      nofile:
        soft: 200000
        hard: 200000

  log_collector:
    build:
      context: ./log_collector
      dockerfile: Dockerfile
      network: host
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env.collector
    depends_on:
      rabbitmq:
        condition: service_healthy
      manticore:
        condition: service_healthy

      
volumes:
  manticore_data:
  rabbitmq_data: